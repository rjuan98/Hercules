name: Build Hércules Companion (Android)

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/android-companion.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      # Sem isto, cada build geraria uma assinatura de debug diferente e o
      # Android recusaria atualizar o app sem desinstalar antes (perdendo o
      # login salvo). Guardamos o keystore em cache para reusar sempre a mesma.
      - name: Restore cached debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1

      - name: Generate debug keystore if missing
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android \
              -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Herc,OU=Hercules,O=Hercules,L=BR,S=BR,C=BR"
          fi

      # Impressão digital (SHA-256) da assinatura de debug — necessária para o
      # assetlinks.json que prova ao Android que só o nosso app pode receber
      # o retorno do login do Google (Android App Links). Aparece nos logs
      # deste passo; copie de lá para app.py (rota /.well-known/assetlinks.json).
      - name: Print debug keystore SHA-256 fingerprint
        run: |
          keytool -list -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey \
            | grep "SHA256:"

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: herc-companion-debug
          path: android/app/build/outputs/apk/debug/*.apk
